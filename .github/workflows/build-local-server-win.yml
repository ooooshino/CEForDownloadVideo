name: Build Windows Local Server

on:
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: local-server/package-lock.json

      - name: Install dependencies
        working-directory: local-server
        run: npm ci

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Build Windows executable
        working-directory: local-server
        run: npm run build:win

      - name: Copy ffmpeg tools
        working-directory: local-server
        run: |
          Copy-Item "C:\ProgramData\chocolatey\bin\ffmpeg.exe" "release-win\ffmpeg.exe"
          Copy-Item "C:\ProgramData\chocolatey\bin\ffprobe.exe" "release-win\ffprobe.exe"

      - name: Verify packaged server health
        working-directory: local-server
        run: |
          $proc = Start-Process -FilePath ".\release-win\Start-Local-Video-Server.bat" -WorkingDirectory ".\release-win" -PassThru
          try {
            $health = $null
            for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Seconds 1
              try {
                $health = Invoke-RestMethod "http://127.0.0.1:37891/health"
                break
              } catch {
              }
            }

            if (-not $health) {
              throw "Local server failed to start or /health did not respond"
            }
            if (-not $health.ffmpeg -or -not $health.ffprobe) {
              throw "Packaged server is missing ffmpeg or ffprobe: $($health | ConvertTo-Json -Compress)"
            }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Pack release zip
        working-directory: local-server
        run: Compress-Archive -Path .\release-win\* -DestinationPath .\VideoExportLocalServer-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoExportLocalServer-win-x64
          path: local-server/VideoExportLocalServer-win-x64.zip
