<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Export</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <div class="app">
      <div class="sticky-shell">
        <header class="topbar panel surface">
          <div class="title-wrap stack">
            <div class="eyebrow">SIDE PANEL / EXPORT</div>
            <h1>VIDEO<br />EXPORT</h1>
            <p id="page-meta" class="muted hero-meta">等待页面数据…</p>
          </div>
          <div class="top-actions">
            <span id="health-badge" class="badge pending">CHECK</span>
            <button id="refresh-btn" class="button secondary" type="button">刷新检测</button>
          </div>
        </header>
        <div class="selection-toolbar panel surface">
          <div class="row selection-row">
            <button id="select-all-btn" class="button secondary small" type="button">全选</button>
            <button id="invert-btn" class="button secondary small" type="button">反选</button>
            <button id="freeze-btn" class="button secondary small" type="button">锁定已选</button>
          </div>
        </div>
      </div>

      <section class="panel surface">
        <div class="section-head">
          <div class="stack tight">
            <span class="eyebrow">DETECTED FEED</span>
            <strong class="section-title">视频列表</strong>
            <p id="health-text" class="muted inline-status">正在检查本地服务状态</p>
          </div>
        </div>
        <div id="video-list" class="video-list"></div>
      </section>

      <section class="panel surface">
        <div class="section-head">
          <div class="stack tight">
            <span class="eyebrow">EXPORT RANGE</span>
            <strong class="section-title">导出设置</strong>
            <p class="muted">上传图片后，按开始和结束秒数裁切导出。</p>
          </div>
          <span class="muted small-text">AUTO / 5S</span>
        </div>
        <div class="form-grid">
          <label class="field">
            <span class="field-label">COVER</span>
            <div class="file-picker">
              <input id="cover-input" class="file-input" type="file" accept="image/*" />
              <label for="cover-input" class="button secondary file-picker-button">选择图片</label>
              <span id="cover-file-name" class="file-name">未选择文件</span>
            </div>
          </label>
          <div class="range-grid">
            <label class="field">
              <span class="field-label">START</span>
              <input id="start-time-input" class="input" type="number" min="0" step="1" value="0" />
            </label>
            <label class="field">
              <span class="field-label">END</span>
              <input id="end-time-input" class="input" type="number" min="1" step="1" value="8" />
            </label>
          </div>
        </div>
        <button id="export-btn" class="button primary block" type="button">导出</button>
        <p id="status-text" class="muted status-line"></p>
      </section>

      <section class="panel surface">
        <div class="section-head">
          <div class="stack tight">
            <span class="eyebrow">BATCH LOG</span>
            <strong class="section-title">批量结果</strong>
            <p class="muted">每个视频分别返回成功或失败。</p>
          </div>
        </div>
        <div id="result-list" class="result-list empty">还没有导出结果</div>
      </section>
    </div>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
